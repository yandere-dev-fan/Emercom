<section class="panel compact stack gap-s">
    <h2>Панель РТП</h2>
    {% if session.scenario_state and session.scenario_state.incident_revealed %}
    <div class="grid-two">
        <label class="field">
            <span>Техника</span>
            <select id="rtp-vehicle-id">
                {% for vehicle in session.vehicles %}
                <option value="{{ vehicle.id }}">{{ vehicle.display_name }}</option>
                {% endfor %}
            </select>
        </label>
        <label class="field">
            <span>Точки маршрута на объекте (x,y;x,y)</span>
            <input type="text" id="rtp-route-points" value="1,1;4,4">
        </label>
    </div>
    <div class="button-row">
        <button class="button primary" type="button" id="rtp-route-btn">Применить маршрут</button>
    </div>
    <div class="grid-three">
        <label class="field">
            <span>Направление</span>
            <input type="number" id="rtp-heading" value="0" min="0" max="359">
        </label>
        <label class="field">
            <span>Скорость (м/с)</span>
            <input type="number" id="rtp-speed" value="3" min="0" max="50" step="0.5">
        </label>
        <button class="button" type="button" id="rtp-drive-btn">Сдвинуть</button>
    </div>
    <div class="grid-two">
        <label class="field">
            <span>Линия рукава (x,y;x,y)</span>
            <input type="text" id="rtp-hose-points" value="0,0;4,4">
        </label>
        <button class="button" type="button" id="rtp-hose-btn">Создать рукав</button>
    </div>
    {% else %}
    <p class="muted">РТП ждёт подтвержденного прибытия техники. Карта объекта откроется автоматически после верного прибытия.</p>
    {% endif %}
</section>
